<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Campus Quest · Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: "Inter", "Noto Sans SC", system-ui, -apple-system, sans-serif;
      background: #F1ECDF;
      color: #15140F;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }
    .display { font-family: "Space Grotesk", "Noto Sans SC", sans-serif; letter-spacing: -0.02em; }
    .mono    { font-family: "JetBrains Mono", ui-monospace, monospace; font-feature-settings: "tnum"; }
    button { font-family: inherit; cursor: pointer; border: 0; background: transparent; padding: 0; color: inherit; }
    a { color: inherit; text-decoration: none; }
    input { font-family: inherit; }

    .noscroll::-webkit-scrollbar { display: none; }
    .noscroll { scrollbar-width: none; -ms-overflow-style: none; }

    /* custom scroll */
    .softscroll::-webkit-scrollbar { width: 10px; height: 10px; }
    .softscroll::-webkit-scrollbar-track { background: transparent; }
    .softscroll::-webkit-scrollbar-thumb { background: rgba(20,18,12,0.10); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
    .softscroll::-webkit-scrollbar-thumb:hover { background: rgba(20,18,12,0.18); border: 2px solid transparent; background-clip: padding-box; }

    @keyframes cq-fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes cq-toast-in { from { opacity: 0; transform: translateY(-12px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes cq-pop { 0% { transform: scale(1); } 50% { transform: scale(1.18); } 100% { transform: scale(1); } }
    @keyframes cq-pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
    @keyframes cq-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(201,242,62,0); } 50% { box-shadow: 0 0 0 6px rgba(201,242,62,0.18); } }
    .cq-pop { animation: cq-pop 480ms cubic-bezier(.4,1.4,.6,1); }
    .cq-fade-up { animation: cq-fade-up 320ms ease-out both; }
    .cq-screen-enter { animation: cq-fade-up 280ms ease-out both; }

    .cq-card-hover { transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease; }
    .cq-card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(20,18,12,0.10); }

    .cq-btn-pri:hover { background: #1F1D14 !important; }
    .cq-btn-sec:hover { background: #EBE3CB !important; }
    .cq-link:hover { color: #15140F !important; }

    .cq-nav-item { transition: background 180ms, color 180ms; }
    .cq-nav-item:hover { background: rgba(20,18,12,0.04); color: #15140F !important; }

    @media (max-width: 1180px) {
      .cq-grid-3 { grid-template-columns: 1fr 1fr !important; }
      .cq-side-rail { display: none !important; }
    }
    @media (max-width: 880px) {
      .cq-shell { grid-template-columns: 72px 1fr !important; }
      .cq-nav-text { display: none !important; }
      .cq-side-card { display: none !important; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef, useMemo, useCallback, createContext, useContext, Fragment } = React;

    /* TOKENS */
    const T = {
      bg: '#F1ECDF', bg2: '#E8E0CA',
      ink: '#15140F', ink2: '#3A382E',
      muted: '#736B57', subtle: '#A89E82',
      surface: '#FFFDF7', card: '#FAF5E6', cardAlt: '#EFE8D2',
      line: '#DCD3B8', lineSoft: '#E8DFC4',
      lime: '#C9F23E', limeDeep: '#7FA01F',
      coral: '#FF6A3D', amber: '#FFB547',
      blue: '#5B8DF6', green: '#4A8050',
      water: '#9DC8DC', brown: '#2A2820', brownDeep: '#15140F',
    };

    /* ICONS (same set as mobile) */
    const Ic = {
      Home: ({s=20,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 11l8-7 8 7v8a2 2 0 0 1-2 2h-3v-6h-6v6H6a2 2 0 0 1-2-2v-8z"/></svg>,
      Map: ({s=20,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6l6-2 6 2 6-2v14l-6 2-6-2-6 2V6z"/><path d="M9 4v16M15 6v16"/></svg>,
      Play: ({s=20,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="9" r="3.5"/><circle cx="17" cy="11" r="2.5"/><path d="M3 20c1-3 3.5-4.5 6-4.5s5 1.5 6 4.5"/><path d="M14 19c0.6-2.2 2.2-3.5 4-3.5"/></svg>,
      Badge: ({s=20,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l2.5 2.5L18 5l1 3.5L21.5 11 19 13.5 18 17l-3.5-.5L12 19l-2.5-2.5L6 17l-1-3.5L2.5 11 5 8.5 6 5l3.5.5L12 3z"/><path d="M9 11l2.5 2.5L15 10"/></svg>,
      Spark: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M12 2l1.8 5.4L19 9l-5.2 1.6L12 16l-1.8-5.4L5 9l5.2-1.6L12 2zm6 11l1 3 3 1-3 1-1 3-1-3-3-1 3-1 1-3z"/></svg>,
      Flame: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M12 2s5 4 5 9a5 5 0 1 1-10 0c0-2 1-3 2-4-1 3 2 4 2 4s-2-3 1-9z"/></svg>,
      Clock: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>,
      Walk: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="13" cy="4" r="1.6"/><path d="M9 21l3-7 3 3 3 1"/><path d="M5 13l3-3 3 1 2 3"/></svg>,
      Run: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="14" cy="4" r="1.6"/><path d="M5 21l4-6-2-3 4-3 3 3 3 1"/><path d="M14 9l-2 5"/></svg>,
      Stretch: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="4" r="1.7"/><path d="M5 10l4-2 3 1 3-1 4 2"/><path d="M9 9l1 6-2 5"/><path d="M15 9l-1 6 2 5"/></svg>,
      Group: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="9" r="3"/><circle cx="17" cy="10" r="2.4"/><path d="M3 19c.8-3 3-4.5 6-4.5s5.2 1.5 6 4.5"/><path d="M15 19c.5-2 2-3 3.5-3"/></svg>,
      Compass: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M15.5 8.5l-2 5-5 2 2-5 5-2z"/></svg>,
      ArrowR: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>,
      Plus: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
      Check: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5 9-11"/></svg>,
      Close: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>,
      Bell: ({s=18,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M6 16l-1 2h14l-1-2V11a6 6 0 1 0-12 0v5z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>,
      Search: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="6.5"/><path d="M16 16l4 4"/></svg>,
      Pin: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s7-7.5 7-13a7 7 0 1 0-14 0c0 5.5 7 13 7 13z"/><circle cx="12" cy="9" r="2.5"/></svg>,
      Lock: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 1 1 8 0v3"/></svg>,
      Filter: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 5h16l-6 8v6l-4-2v-4L4 5z"/></svg>,
      Layers: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/></svg>,
      ChevDown: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>,
      ChevR: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6l6 6-6 6"/></svg>,
      Trophy: ({s=18,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M7 4h10v4a5 5 0 0 1-10 0V4z"/><path d="M5 6H3v2a3 3 0 0 0 3 3M19 6h2v2a3 3 0 0 1-3 3"/><path d="M10 14h4v3l1 3H9l1-3v-3z"/></svg>,
      Lightning: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg>,
      Settings: ({s=18,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.7" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.3.9a7 7 0 0 0-2-1.2L14 3h-4l-.6 2.6a7 7 0 0 0-2 1.2l-2.3-.9-2 3.4 2 1.5A7 7 0 0 0 5 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.4 2.3-.9a7 7 0 0 0 2 1.2L10 21h4l.6-2.6a7 7 0 0 0 2-1.2l2.3.9 2-3.4-2-1.5c.1-.4.1-.8.1-1.2z"/></svg>,
    };

    /* TOAST */
    function ToastHost({toasts}) {
      return (
        <div style={{
          position:'fixed', top: 24, right: 24, zIndex: 100,
          display:'flex', flexDirection:'column', gap: 8, pointerEvents:'none',
        }}>
          {toasts.map(t => (
            <div key={t.id}
              style={{
                animation: 'cq-toast-in 240ms cubic-bezier(.2,1,.4,1) both',
                background: T.brownDeep, color: '#FFF',
                borderRadius: 14, padding: '12px 14px',
                boxShadow: '0 16px 36px rgba(20,18,12,0.28), 0 2px 4px rgba(20,18,12,0.10)',
                display:'flex', alignItems:'center', gap: 10,
                fontSize: 13, fontWeight: 500, minWidth: 280,
              }}>
              <div style={{
                width: 24, height: 24, borderRadius: 99,
                background: T.lime, color: T.brownDeep,
                display:'grid', placeItems:'center', flex:'0 0 auto',
              }}>
                {t.icon === 'check' ? <Ic.Check s={13} c={T.brownDeep}/> :
                 t.icon === 'group' ? <Ic.Group s={13} c={T.brownDeep}/> :
                 t.icon === 'pin' ? <Ic.Pin s={13} c={T.brownDeep}/> :
                 <Ic.Spark s={13} c={T.brownDeep}/>}
              </div>
              <div style={{flex: 1, minWidth: 0}}>
                <div style={{fontWeight: 600}}>{t.title}</div>
                {t.detail && <div style={{fontSize: 11.5, color:'rgba(255,255,255,0.6)', marginTop: 2}}>{t.detail}</div>}
              </div>
            </div>
          ))}
        </div>
      );
    }

    /* PRIMITIVES */
    function Pill({children, tone='neutral', size='sm', icon}) {
      const tones = {
        neutral: { bg: T.cardAlt, fg: T.ink2 },
        ink: { bg: T.brownDeep, fg: T.lime },
        lime: { bg: T.lime, fg: T.brownDeep },
        coral: { bg: '#FFE7DD', fg: '#B74519' },
        amber: { bg: '#FFF1D6', fg: '#8C5A00' },
        green: { bg: '#E5EFD7', fg: '#3F5E1F' },
        blue: { bg: '#E2ECFC', fg: '#274A95' },
        ghost: { bg: 'transparent', fg: T.muted, bd: T.line },
      };
      const t = tones[tone] || tones.neutral;
      const pad = size === 'xs' ? '2px 8px' : size === 'lg' ? '6px 12px' : '4px 10px';
      const fs = size === 'xs' ? 10 : size === 'lg' ? 12 : 11;
      return (
        <span style={{
          display:'inline-flex', alignItems:'center', gap: 4,
          background: t.bg, color: t.fg,
          border: t.bd ? `1px solid ${t.bd}` : 'none',
          padding: pad, borderRadius: 999,
          fontSize: fs, fontWeight: 600, letterSpacing: '0.02em',
          lineHeight: 1, whiteSpace: 'nowrap',
        }}>
          {icon}{children}
        </span>
      );
    }

    function Counter({value}) {
      const [display, setDisplay] = useState(value);
      const prev = useRef(value);
      const [pop, setPop] = useState(false);
      useEffect(() => {
        if (value === prev.current) return;
        const start = prev.current, end = value, dur = 600, t0 = performance.now();
        let raf;
        const tick = (t) => {
          const p = Math.min(1, (t - t0) / dur);
          const eased = 1 - Math.pow(1 - p, 3);
          setDisplay(Math.round(start + (end - start) * eased));
          if (p < 1) raf = requestAnimationFrame(tick); else prev.current = end;
        };
        raf = requestAnimationFrame(tick);
        setPop(true);
        const tm = setTimeout(() => setPop(false), 480);
        return () => { cancelAnimationFrame(raf); clearTimeout(tm); };
      }, [value]);
      return <span className={pop ? 'cq-pop' : ''} style={{display:'inline-block'}}>{display}</span>;
    }

    /* SIDEBAR */
    function Sidebar({active, setActive, state}) {
      const items = [
        { k:'home', label:'首页', en:'Home', Icon: Ic.Home },
        { k:'map', label:'地图', en:'Map', Icon: Ic.Map },
        { k:'play', label:'共玩', en:'Co-Play', Icon: Ic.Play },
        { k:'badges', label:'徽章', en:'Badges', Icon: Ic.Badge },
      ];
      const pct = Math.round((state.seasonLit / state.seasonTotal) * 100);
      return (
        <aside style={{
          background: T.surface,
          borderRight: `1px solid ${T.line}`,
          display:'flex', flexDirection:'column',
          padding: '24px 14px',
          height: '100vh', position:'sticky', top: 0,
        }}>
          {/* Logo */}
          <div style={{display:'flex', alignItems:'center', gap: 10, padding: '0 6px 4px'}}>
            <div style={{
              width: 36, height: 36, borderRadius: 11,
              background: T.brownDeep, color: T.lime,
              display:'grid', placeItems:'center',
              fontFamily:'"Space Grotesk"', fontWeight: 700, fontSize: 15,
              letterSpacing:'-0.04em',
            }}>CQ</div>
            <div className="cq-nav-text">
              <div className="display" style={{fontSize: 14, fontWeight: 600, color: T.ink, lineHeight: 1.1}}>Campus Quest</div>
              <div style={{fontSize: 10, color: T.muted, letterSpacing:'0.10em', marginTop: 1}} className="mono">S04 · LAKESIDE SPRING</div>
            </div>
          </div>

          {/* Nav */}
          <nav style={{display:'flex', flexDirection:'column', gap: 2, marginTop: 28}}>
            <div className="cq-nav-text" style={{fontSize: 10, color: T.subtle, letterSpacing:'0.12em', padding: '0 6px 6px'}} >
              <span className="mono">NAVIGATION</span>
            </div>
            {items.map(it => {
              const on = active === it.k;
              return (
                <button key={it.k} onClick={() => setActive(it.k)}
                  className="cq-nav-item"
                  style={{
                    display:'flex', alignItems:'center', gap: 10,
                    padding: '10px 12px', borderRadius: 10,
                    background: on ? T.brownDeep : 'transparent',
                    color: on ? '#FFF' : T.ink2,
                    textAlign:'left', fontSize: 13.5, fontWeight: on ? 600 : 500,
                    position:'relative',
                  }}>
                  <it.Icon s={18} c={on ? T.lime : T.ink2}/>
                  <span className="cq-nav-text" style={{flex: 1}}>{it.label}</span>
                  {on && <span className="cq-nav-text" style={{
                    fontSize: 10, color:'rgba(255,255,255,0.45)', letterSpacing:'0.10em'
                  }} className="mono">{it.en.toUpperCase()}</span>}
                </button>
              );
            })}
          </nav>

          {/* Season mini-card */}
          <div className="cq-side-card" style={{
            marginTop: 24,
            background: `linear-gradient(160deg, ${T.brownDeep} 0%, #2A2620 100%)`,
            color:'#FFF', borderRadius: 14, padding: 14,
            border:`1px solid ${T.brownDeep}`,
            position:'relative', overflow:'hidden',
          }}>
            <div style={{
              position:'absolute', top: -20, right: -20, width: 80, height: 80, borderRadius: 99,
              background: 'radial-gradient(circle, rgba(201,242,62,0.20) 0%, transparent 60%)',
            }}/>
            <div style={{display:'flex', alignItems:'center', gap: 5, marginBottom: 8, position:'relative'}}>
              <Ic.Spark s={11} c={T.lime}/>
              <span style={{fontSize: 10, color: T.lime, letterSpacing:'0.12em', fontWeight: 700}} className="mono">SEASON</span>
            </div>
            <div className="display" style={{fontSize: 13, fontWeight: 600, lineHeight: 1.2}}>
              湖畔之春
            </div>
            <div style={{display:'flex', alignItems:'baseline', gap: 4, marginTop: 6}}>
              <span className="mono" style={{fontSize: 18, fontWeight: 700, color: T.lime}}><Counter value={state.seasonLit}/></span>
              <span style={{fontSize: 11, color:'rgba(255,255,255,0.45)'}} className="mono">/{state.seasonTotal} 区域</span>
            </div>
            <div style={{height: 4, background:'rgba(255,255,255,0.10)', borderRadius: 99, marginTop: 8, overflow:'hidden'}}>
              <div style={{width: pct+'%', height:'100%', background: T.lime, transition:'width 600ms'}}/>
            </div>
            <div style={{fontSize: 10, color:'rgba(255,255,255,0.45)', marginTop: 6}}>距 06.20 收摊还有 41 天</div>
          </div>

          {/* spacer */}
          <div style={{flex: 1}}/>

          {/* User card */}
          <div style={{
            background: T.cardAlt, borderRadius: 12, padding: 10,
            display:'flex', alignItems:'center', gap: 10,
            border:`1px solid ${T.lineSoft}`,
          }}>
            <div style={{
              width: 32, height: 32, borderRadius: 99,
              background: 'linear-gradient(135deg, #FFB547, #FF6A3D)',
              color:'#FFF', display:'grid', placeItems:'center',
              fontWeight: 700, fontSize: 13, fontFamily:'"Space Grotesk"',
              flex:'0 0 auto',
            }}>毛</div>
            <div className="cq-nav-text" style={{flex: 1, minWidth: 0}}>
              <div style={{fontSize: 12.5, fontWeight: 600, color: T.ink}}>毛柯兰 · @keilan</div>
              <div style={{fontSize: 10.5, color: T.muted}}>湖畔学徒 · TIER 3</div>
            </div>
            <button className="cq-nav-text" style={{padding: 6, borderRadius: 8}}>
              <Ic.Settings s={15} c={T.muted}/>
            </button>
          </div>
        </aside>
      );
    }

    /* TOPBAR */
    function TopBar({state, screen}) {
      const titles = {
        home:{t:'首页', s:'今日任务 · 赛季概览'},
        map:{t:'地图', s:'校园点位 · 任务路线'},
        play:{t:'共玩', s:'附近的轻协作挑战'},
        badges:{t:'徽章 & 档案', s:'你这赛季的沉淀'},
      };

          {tab === 'badges' && (
            <Fragment>
              <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 12}}>
                {filtered.map(b => {
                  const progress = state.badges[b.id] ?? BADGE_STATIC[b.id].baseProgress;
                  const recent = state.recentBadges?.includes(b.id);
                  return <BadgeCard key={b.id} b={b} progress={progress} recent={recent}/>;
                })}
              </div>
              <div style={{
                marginTop: 14,
                background: T.surface, borderRadius: 14,
                border:`1px solid ${T.line}`, padding:'12px 16px',
                fontSize: 12.5, color: T.muted, lineHeight: 1.5,
                display:'flex', gap: 10, alignItems:'flex-start',
              }}>
                <Ic.Spark s={14} c={T.limeDeep}/>
                <span>完成<b style={{color: T.ink}}>探索 · 恢复 · 组队</b>等校园任务，徽章与称号会在这里持续累积。本赛季限定徽章在 06.20 收摊</span>
              </div>
            </Fragment>
          )}

          {tab === 'archive' && <ArchivePane state={state} totalEarned={earned}/>}
        </div>
      );
    }

    /* ================================================================
       APP
    ================================================================ */
    function App() {
      const [screen, setScreen] = useState('home');
      const [toasts, setToasts] = useState([]);
      const [state, setState] = useState({
        vitality: 280, seasonLit: 14, seasonTotal: 22,
        litAreas: ['arts'], onboardDismissed: false,
        taskState: { t1:'idle', t2:'idle', t3:'idle' },
        mapTaskState: { m1:'idle', m2:'idle', m3:'idle', m4:'idle', m5:'idle' },
        playState: { p1:'idle', p2:'idle', p3:'idle', p4:'idle' },
        badges: Object.fromEntries(Object.entries(BADGE_STATIC).map(([k, v]) => [k, v.baseProgress])),
        recentBadges: [],
      });

      const pushToast = useCallback((toast) => {
        const id = Math.random().toString(36).slice(2);
        setToasts(t => [...t, {id, ...toast}]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2800);
      }, []);

      const bumpBadge = useCallback((bid, pts) => {
        if (!bid) return;
        setState(s => ({
          ...s,
          badges: { ...s.badges, [bid]: Math.min(100, (s.badges[bid] ?? 0) + pts) },
          recentBadges: [...new Set([...(s.recentBadges || []), bid])],
        }));
      }, []);

      const lightArea = useCallback((zone) => {
        if (!zone) return;
        setState(s => s.litAreas.includes(zone) ? s : ({
          ...s, litAreas: [...s.litAreas, zone],
          seasonLit: Math.min(s.seasonTotal, s.seasonLit + 1),
        }));
      }, []);

      const actions = useMemo(() => ({
        toast: pushToast,
        dismissOnboard: () => setState(s => ({...s, onboardDismissed: true})),
        completeTask: (task) => {
          setState(s => {
            if (s.taskState[task.id] === 'completed') return s;
            return {...s, taskState: {...s.taskState, [task.id]: 'completed'}, vitality: s.vitality + task.reward};
          });
          if (task.affectsBadge) bumpBadge(task.affectsBadge, task.badgePoints);
          if (task.litArea) lightArea(task.litArea);
          pushToast({
            title: `任务完成 · +${task.reward} 活力`,
            detail: task.litArea ? `点亮「${ZONE_BY_ID[task.litArea]}」 · 徽章已推进` : '徽章进度已推进',
            icon:'check',
          });
        },
        startMapTask: (poi) => {
          setState(s => ({...s, mapTaskState: {...s.mapTaskState, [poi.id]: 'inProgress'}}));
          pushToast({title: `已开始 · ${poi.name}`, detail: `${poi.method} · 预计 ${poi.duration}`, icon:'pin'});
        },
        completeMapTask: (poi) => {
          setState(s => ({...s, mapTaskState: {...s.mapTaskState, [poi.id]: 'completed'}, vitality: s.vitality + poi.reward}));
          if (poi.affectsBadge) bumpBadge(poi.affectsBadge, poi.badgePoints);
          if (poi.zone) lightArea(poi.zone);
          pushToast({title: `任务完成 · +${poi.reward} 活力`, detail: `点亮「${ZONE_BY_ID[poi.zone]}」区域`, icon:'check'});
        },
        joinPlay: (item) => {
          setState(s => {
            if (s.playState[item.id] === 'joined') return s;
            return {...s, playState: {...s.playState, [item.id]: 'joined'}};
          });
          if (item.affectsBadge) bumpBadge(item.affectsBadge, item.badgePoints);
          pushToast({title: `已加入 · ${item.title}`, detail: `推进「春日共玩」徽章 · 等待开始`, icon:'group'});
        },
      }), [pushToast, bumpBadge, lightArea]);

      useEffect(() => {
        if (!state.recentBadges?.length) return;
        const t = setTimeout(() => setState(s => ({...s, recentBadges: []})), 5500);
        return () => clearTimeout(t);
      }, [state.recentBadges]);

      const Screen =
        screen === 'home' ? <ScreenHome state={state} actions={actions} onJump={setScreen}/> :
        screen === 'map'  ? <ScreenMap state={state} actions={actions}/> :
        screen === 'play' ? <ScreenPlay state={state} actions={actions} onJump={setScreen}/> :
                            <ScreenBadges state={state} actions={actions}/>;

      return (
        <div className="cq-shell" style={{
          display:'grid', gridTemplateColumns: '244px 1fr',
          minHeight:'100vh', background: T.bg,
        }}>
          <Sidebar active={screen} setActive={setScreen} state={state}/>
          <main className="softscroll" style={{minHeight:'100vh', minWidth: 0}}>
            <TopBar state={state} screen={screen}/>
            <ToastHost toasts={toasts}/>
            {Screen}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
