<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Campus Quest · Hi-Fi Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: "Inter", "Noto Sans SC", system-ui, -apple-system, sans-serif;
      background: #0F0E0A;
      color: #15140F;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .display { font-family: "Space Grotesk", "Noto Sans SC", sans-serif; letter-spacing: -0.02em; }
    .mono    { font-family: "JetBrains Mono", ui-monospace, monospace; font-feature-settings: "tnum"; }
    button { font-family: inherit; cursor: pointer; border: 0; background: transparent; padding: 0; color: inherit; }
    a { color: inherit; text-decoration: none; }
    .stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(80% 60% at 50% 20%, #1d1c16 0%, #0F0E0A 60%);
    }
    .stage::before {
      content: ""; position: absolute; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 24px 24px; pointer-events: none;
    }
    .device {
      position: relative;
      width: 390px; height: 844px;
      border-radius: 52px;
      background: #15140F;
      box-shadow:
        0 60px 120px rgba(0,0,0,0.6),
        0 20px 40px rgba(0,0,0,0.4),
        inset 0 0 0 2px #2a2820,
        inset 0 0 0 8px #15140F;
      padding: 8px;
    }
    .screen {
      width: 100%; height: 100%;
      border-radius: 44px;
      overflow: hidden;
      background: #F1ECDF;
      position: relative;
      isolation: isolate;
    }
    .device::after {
      content: ""; position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 32px; background: #15140F; border-radius: 20px; z-index: 50;
    }
    .side {
      position: fixed; top: 24px; left: 24px; color: rgba(255,255,255,0.55);
      font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 1.6px;
      text-transform: uppercase;
    }
    .side b { color: #C9F23E; font-weight: 600; }
    .hint {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 1.2px;
      text-transform: uppercase; text-align: center;
    }
    .hint kbd {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px; padding: 2px 6px; margin: 0 3px; color: rgba(255,255,255,0.7);
    }
    .noscroll::-webkit-scrollbar { display: none; }
    .noscroll { scrollbar-width: none; -ms-overflow-style: none; }

    /* Animations */
    @keyframes cq-fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes cq-toast-in { from { opacity: 0; transform: translateY(-12px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes cq-pop { 0% { transform: scale(1); } 50% { transform: scale(1.18); } 100% { transform: scale(1); } }
    @keyframes cq-shimmer { 0% { background-position: -120% 0; } 100% { background-position: 220% 0; } }
    @keyframes cq-pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
    @keyframes cq-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(201,242,62,0); } 50% { box-shadow: 0 0 0 6px rgba(201,242,62,0.18); } }
    @keyframes cq-ring { 0% { transform: scale(0.6); opacity: 0.7; } 100% { transform: scale(2.4); opacity: 0; } }

    .cq-pop { animation: cq-pop 480ms cubic-bezier(.4,1.4,.6,1); }
    .cq-fade-up { animation: cq-fade-up 320ms ease-out both; }
    .cq-shimmer {
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.55) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: cq-shimmer 1.4s ease-in-out infinite;
    }
    .cq-screen-enter { animation: cq-fade-up 280ms ease-out both; }

    @media (max-width: 720px), (max-height: 720px) {
      .side, .hint { display: none; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" crossorigin="anonymous"></script>
  <script>
    /* Auto-fit the 390×844 device frame to any viewport */
    (function() {
      const fit = () => {
        const dev = document.getElementById('device');
        if (!dev) return;
        const margin = 60;
        const sH = (window.innerHeight - margin) / 844;
        const sW = (window.innerWidth - margin) / 390;
        const scale = Math.min(1, sH, sW);
        dev.style.transform = scale < 1 ? `scale(${scale})` : '';
        dev.style.transformOrigin = 'center center';
      };
      window.addEventListener('resize', fit);
      window.addEventListener('load', fit);
      setTimeout(fit, 0); setTimeout(fit, 200);
    })();
  </script>
</head>
<body>
  <div class="side">
    <span>CAMPUS QUEST</span> · <b>S04 · 湖畔之春</b><br/>
    <span style="opacity:0.6">HI-FI PROTOTYPE · CORNELL ITHACA</span>
  </div>
  <div class="hint">
    点击底部 <kbd>Tab</kbd> 切换 · 卡片可点 · 任务可完成 · 完成后看徽章变化
  </div>
  <div class="stage">
    <div class="device" id="device">
      <div class="screen" id="root"></div>
    </div>
  </div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef, useMemo, useCallback, createContext, useContext, Fragment } = React;

    /* ================================================================
       DESIGN TOKENS
    ================================================================ */
    const T = {
      bg: '#F1ECDF', bg2: '#E8E0CA',
      ink: '#15140F', ink2: '#3A382E',
      muted: '#736B57', subtle: '#A89E82',
      surface: '#FFFDF7', card: '#FAF5E6', cardAlt: '#EFE8D2',
      line: '#DCD3B8', lineSoft: '#E8DFC4',
      lime: '#C9F23E', limeDeep: '#7FA01F',
      coral: '#FF6A3D', amber: '#FFB547',
      blue: '#5B8DF6', green: '#4A8050', sky: '#A8D5E6',
      water: '#9DC8DC',
      brown: '#2A2820', brownDeep: '#15140F',
    };

    /* ================================================================
       ICONS
    ================================================================ */
    const Ic = {
      Home: ({s=20,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 11l8-7 8 7v8a2 2 0 0 1-2 2h-3v-6h-6v6H6a2 2 0 0 1-2-2v-8z"/></svg>,
      Map: ({s=20,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6l6-2 6 2 6-2v14l-6 2-6-2-6 2V6z"/><path d="M9 4v16M15 6v16"/></svg>,
      Play: ({s=20,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="9" r="3.5"/><circle cx="17" cy="11" r="2.5"/><path d="M3 20c1-3 3.5-4.5 6-4.5s5 1.5 6 4.5"/><path d="M14 19c0.6-2.2 2.2-3.5 4-3.5"/></svg>,
      Badge: ({s=20,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l2.5 2.5L18 5l1 3.5L21.5 11 19 13.5 18 17l-3.5-.5L12 19l-2.5-2.5L6 17l-1-3.5L2.5 11 5 8.5 6 5l3.5.5L12 3z"/><path d="M9 11l2.5 2.5L15 10"/></svg>,
      Spark: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M12 2l1.8 5.4L19 9l-5.2 1.6L12 16l-1.8-5.4L5 9l5.2-1.6L12 2zm6 11l1 3 3 1-3 1-1 3-1-3-3-1 3-1 1-3z"/></svg>,
      Flame: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M12 2s5 4 5 9a5 5 0 1 1-10 0c0-2 1-3 2-4-1 3 2 4 2 4s-2-3 1-9z"/></svg>,
      Clock: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>,
      Walk: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="13" cy="4" r="1.6"/><path d="M9 21l3-7 3 3 3 1"/><path d="M5 13l3-3 3 1 2 3"/></svg>,
      Run: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="14" cy="4" r="1.6"/><path d="M5 21l4-6-2-3 4-3 3 3 3 1"/><path d="M14 9l-2 5"/></svg>,
      Stretch: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="4" r="1.7"/><path d="M5 10l4-2 3 1 3-1 4 2"/><path d="M9 9l1 6-2 5"/><path d="M15 9l-1 6 2 5"/></svg>,
      Group: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="9" r="3"/><circle cx="17" cy="10" r="2.4"/><path d="M3 19c.8-3 3-4.5 6-4.5s5.2 1.5 6 4.5"/><path d="M15 19c.5-2 2-3 3.5-3"/></svg>,
      Compass: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M15.5 8.5l-2 5-5 2 2-5 5-2z"/></svg>,
      ArrowR: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>,
      Plus: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
      Check: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5 9-11"/></svg>,
      Close: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>,
      Bell: ({s=18,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M6 16l-1 2h14l-1-2V11a6 6 0 1 0-12 0v5z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>,
      Search: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="6.5"/><path d="M16 16l4 4"/></svg>,
      Pin: ({s=16,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s7-7.5 7-13a7 7 0 1 0-14 0c0 5.5 7 13 7 13z"/><circle cx="12" cy="9" r="2.5"/></svg>,
      Lock: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 1 1 8 0v3"/></svg>,
      Filter: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 5h16l-6 8v6l-4-2v-4L4 5z"/></svg>,
      Layers: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/></svg>,
      ChevDown: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>,
      ChevR: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6l6 6-6 6"/></svg>,
      Trophy: ({s=18,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M7 4h10v4a5 5 0 0 1-10 0V4z"/><path d="M5 6H3v2a3 3 0 0 0 3 3M19 6h2v2a3 3 0 0 1-3 3"/><path d="M10 14h4v3l1 3H9l1-3v-3z"/></svg>,
      Lightning: ({s=14,c='currentColor'}) => <svg width={s} height={s} viewBox="0 0 24 24" fill={c}><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg>,
    };

    /* ================================================================
       UTILS
    ================================================================ */
    const cls = (...xs) => xs.filter(Boolean).join(' ');
    const fmt = (n) => n.toLocaleString('en-US');

    /* ================================================================
       TOAST SYSTEM
    ================================================================ */
    const ToastCtx = createContext(null);
    const useToast = () => useContext(ToastCtx);

    function ToastHost({toasts}) {
      return (
        <div style={{
          position:'absolute', top: 56, left: 0, right: 0, zIndex: 60,
          display:'flex', flexDirection:'column', alignItems:'center', gap: 8,
          pointerEvents:'none', padding: '0 24px',
        }}>
          {toasts.map(t => (
            <div key={t.id}
              style={{
                animation: 'cq-toast-in 240ms cubic-bezier(.2,1,.4,1) both',
                background: t.tone === 'dark' ? T.brownDeep : T.surface,
                color: t.tone === 'dark' ? '#FFF' : T.ink,
                border: t.tone === 'dark' ? 'none' : `1px solid ${T.line}`,
                borderRadius: 14,
                padding: '11px 14px',
                boxShadow: '0 12px 24px rgba(20,18,12,0.18), 0 2px 4px rgba(20,18,12,0.06)',
                display:'flex', alignItems:'center', gap: 10,
                fontSize: 13, fontWeight: 500, letterSpacing: '0.01em',
                maxWidth: '100%',
              }}>
              <div style={{
                width: 22, height: 22, borderRadius: 11,
                background: t.tone === 'dark' ? T.lime : T.lime,
                color: T.brownDeep, display:'grid', placeItems:'center',
                flex:'0 0 auto'
              }}>
                {t.icon === 'check' ? <Ic.Check s={12} c={T.brownDeep} /> :
                 t.icon === 'spark' ? <Ic.Spark s={12} c={T.brownDeep} /> :
                 t.icon === 'group' ? <Ic.Group s={12} c={T.brownDeep} /> :
                 t.icon === 'pin' ? <Ic.Pin s={12} c={T.brownDeep} /> :
                 <Ic.Check s={12} c={T.brownDeep} />}
              </div>
              <div style={{display:'flex', flexDirection:'column', minWidth: 0}}>
                <div style={{whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{t.title}</div>
                {t.detail && <div style={{fontSize: 11, opacity: 0.65, fontWeight: 400, marginTop: 1}}>{t.detail}</div>}
              </div>
            </div>
          ))}
        </div>
      );
    }

    /* ================================================================
       SHARED PRIMITIVES
    ================================================================ */
    function StatusBar({tone='light'}) {
      const c = tone === 'light' ? T.ink : '#FFF';
      return (
        <div style={{
          height: 48, width: '100%', display:'flex', alignItems:'flex-end',
          justifyContent:'space-between', padding: '0 28px 4px',
          color: c, fontSize: 14, fontWeight: 600, letterSpacing: '0.01em',
          fontFamily:'"Space Grotesk", sans-serif',
          flex: '0 0 auto', position: 'relative', zIndex: 5,
        }}>
          <span>9:41</span>
          <span style={{display:'flex', alignItems:'center', gap: 6, opacity: 0.85}}>
            <svg width="16" height="10" viewBox="0 0 18 12" fill="none">
              <rect x="1" y="6" width="2.5" height="5" rx="0.5" fill={c}/>
              <rect x="5" y="4" width="2.5" height="7" rx="0.5" fill={c}/>
              <rect x="9" y="2" width="2.5" height="9" rx="0.5" fill={c}/>
              <rect x="13" y="0" width="2.5" height="11" rx="0.5" fill={c}/>
            </svg>
            <svg width="14" height="10" viewBox="0 0 16 12" fill="none">
              <path d="M8 3a8 8 0 0 1 5 1.7l-1 1.3a6 6 0 0 0-8 0L3 4.7A8 8 0 0 1 8 3zM8 6.5a4 4 0 0 1 2.5.9l-1 1.3a2 2 0 0 0-3 0l-1-1.3A4 4 0 0 1 8 6.5z" fill={c}/>
              <circle cx="8" cy="10" r="1" fill={c}/>
            </svg>
            <svg width="22" height="10" viewBox="0 0 24 12" fill="none">
              <rect x="0.5" y="0.5" width="20" height="11" rx="2.5" stroke={c} fill="none"/>
              <rect x="2" y="2" width="14" height="8" rx="1" fill={c}/>
              <rect x="21" y="4" width="2" height="4" rx="0.5" fill={c}/>
            </svg>
          </span>
        </div>
      );
    }

    function TabBar({active, setActive}) {
      const items = [
        { k:'home', label:'首页', Icon: Ic.Home },
        { k:'map', label:'地图', Icon: Ic.Map },
        { k:'play', label:'共玩', Icon: Ic.Play },
        { k:'badges', label:'徽章', Icon: Ic.Badge },
      ];
      return (
        <div style={{
          flex: '0 0 auto', position: 'relative',
          padding: '8px 14px 18px',
          background: 'linear-gradient(180deg, rgba(241,236,223,0) 0%, rgba(241,236,223,0.85) 30%, #F1ECDF 60%)',
        }}>
          <div style={{
            background: T.surface,
            borderRadius: 22,
            border: `1px solid ${T.line}`,
            display:'flex', justifyContent:'space-around', padding: '8px 6px',
            boxShadow: '0 4px 14px rgba(20,18,12,0.06), 0 1px 2px rgba(20,18,12,0.04)',
          }}>
            {items.map(it => {
              const on = active === it.k;
              return (
                <button key={it.k}
                  onClick={() => setActive(it.k)}
                  style={{
                    flex: 1, display:'flex', flexDirection:'column', alignItems:'center', gap: 2,
                    padding: '6px 4px',
                    color: on ? T.ink : T.subtle,
                    transition: 'color 200ms',
                    position:'relative',
                  }}>
                  <div style={{
                    width: 36, height: 28, display:'grid', placeItems:'center',
                    borderRadius: 10,
                    background: on ? T.lime : 'transparent',
                    transition: 'background 200ms',
                  }}>
                    <it.Icon s={19} c={on ? T.brownDeep : T.subtle} />
                  </div>
                  <div style={{
                    fontSize: 10.5, fontWeight: on ? 700 : 500, letterSpacing:'0.04em',
                    color: on ? T.ink : T.subtle,
                  }}>{it.label}</div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function Pill({children, tone='neutral', size='sm', icon}) {
      const tones = {
        neutral: { bg: T.cardAlt, fg: T.ink2, bd: 'transparent' },
        ink: { bg: T.brownDeep, fg: T.lime, bd: 'transparent' },
        lime: { bg: T.lime, fg: T.brownDeep, bd: 'transparent' },
        coral: { bg: '#FFE7DD', fg: '#B74519', bd: 'transparent' },
        amber: { bg: '#FFF1D6', fg: '#8C5A00', bd: 'transparent' },
        green: { bg: '#E5EFD7', fg: '#3F5E1F', bd: 'transparent' },
        blue: { bg: '#E2ECFC', fg: '#274A95', bd: 'transparent' },
        ghost: { bg: 'transparent', fg: T.muted, bd: T.line },
        invert: { bg: 'rgba(255,255,255,0.12)', fg: '#FFF', bd: 'rgba(255,255,255,0.18)'},
      };
      const t = tones[tone] || tones.neutral;
      const pad = size === 'xs' ? '2px 7px' : size === 'lg' ? '6px 12px' : '4px 9px';
      const fs = size === 'xs' ? 10 : size === 'lg' ? 12 : 11;
      return (
        <span style={{
          display:'inline-flex', alignItems:'center', gap: 4,
          background: t.bg, color: t.fg,
          border: t.bd === 'transparent' ? 'none' : `1px solid ${t.bd}`,
          padding: pad, borderRadius: 999,
          fontSize: fs, fontWeight: 600, letterSpacing: '0.02em',
          lineHeight: 1, whiteSpace: 'nowrap'
        }}>
          {icon}{children}
        </span>
      );
    }

    function VitalityCounter({value}) {
      const [display, setDisplay] = useState(value);
      const prev = useRef(value);
      const [pop, setPop] = useState(false);
      useEffect(() => {
        if (value === prev.current) return;
        const start = prev.current;
        const end = value;
        const dur = 600;
        const t0 = performance.now();
        let raf;
        const tick = (t) => {
          const p = Math.min(1, (t - t0) / dur);
          const eased = 1 - Math.pow(1 - p, 3);
          const v = Math.round(start + (end - start) * eased);
          setDisplay(v);
          if (p < 1) raf = requestAnimationFrame(tick);
          else prev.current = end;
        };
        raf = requestAnimationFrame(tick);
        setPop(true);
        const tm = setTimeout(() => setPop(false), 480);
        return () => { cancelAnimationFrame(raf); clearTimeout(tm); };
      }, [value]);
      return (
        <span className={pop ? 'cq-pop' : ''} style={{display:'inline-block'}}>{display}</span>
      );
    }

    const ZONE_BY_ID = { beebe:'湖畔', slope:'西坡', arts:'艺术四方院', gorge:'峡谷', field:'田径场' };

    function CampusMapSVG({pois, state, onTap, selected, viewBox}) {

          <path d="M 0,580 Q 60,560 90,610 Q 110,660 70,700 L 0,700 Z" fill="url(#forest-grad)" opacity="0.85"/>

          <path d="M 130,250 Q 150,210 220,222 Q 290,232 312,266 Q 320,308 280,326 Q 220,344 170,326 Q 118,308 130,250 Z"

          <text x="222" y="282" textAnchor="middle"
            style={{fontFamily:'"Space Grotesk"', fontSize: 11, fontWeight: 600, fill:'#3D6478', letterSpacing:'0.08em'}}>BEEBE LAKE</text>

          {/* gorge curve */}
          <path d="M 80,460 Q 130,500 160,540 Q 200,600 250,640" fill="none"

          <path d="M 80,460 Q 130,500 160,540 Q 200,600 250,640" fill="none"
            stroke="#B5D4E0" strokeWidth="6" opacity="0.30" strokeLinecap="round"/>

          {/* main path */}
          <path d="M 200,330 Q 200,380 178,420 Q 160,460 180,500 Q 210,540 260,560 Q 290,575 296,392 Z"
            fill="none" stroke={T.line} strokeWidth="1.5" strokeDasharray="4 5" opacity="0.7"/>
          <path d="M 232,290 L 296,392 L 178,422 L 124,520 L 260,580"
            fill="none" stroke={T.line} strokeWidth="1.6" strokeDasharray="5 6" opacity="0.65" strokeLinecap="round"/>

          {/* arts quad */}
          <rect x="270" y="354" width="90" height="80" rx="8" fill="#E5DCC0" stroke={T.line} strokeWidth="1"/>
          <text x="315" y="402" textAnchor="middle"
            style={{fontFamily:'"Space Grotesk"', fontSize: 9, fill: T.muted, letterSpacing:'0.10em'}}>ARTS QUAD</text>

          {/* Libe Slope (slope shape) */}
          <path d="M 130,420 L 220,388 L 220,460 L 130,490 Z" fill="#D4DDB7" opacity="0.75"/>
          <text x="175" y="438" textAnchor="middle"
            style={{fontFamily:'"Space Grotesk"', fontSize: 9, fill:'#506C2C', letterSpacing:'0.10em'}}>LIBE SLOPE</text>

          {/* track field */}
          <ellipse cx="262" cy="582" rx="42" ry="26" fill="#D9C9A8" stroke={T.line} strokeWidth="1"/>
          <ellipse cx="262" cy="582" rx="32" ry="18" fill="none" stroke="#A5895E" strokeWidth="1" strokeDasharray="2 3" opacity="0.7"/>
          <text x="262" y="586" textAnchor="middle"
            style={{fontFamily:'"Space Grotesk"', fontSize: 8, fill:'#7C5F36', letterSpacing:'0.08em'}}>SCHOELLKOPF</text>

          {/* lit zone overlays */}
          {lit.includes('arts') && (
            <rect x="270" y="354" width="90" height="80" rx="8" fill={T.lime} opacity="0.30"/>
          )}
          {lit.includes('slope') && (
            <path d="M 130,420 L 220,388 L 220,460 L 130,490 Z" fill={T.lime} opacity="0.35"/>
          )}
          {lit.includes('beebe') && (
            <path d="M 130,250 Q 150,210 220,222 Q 290,232 312,266 Q 320,308 280,326 Q 220,344 170,326 Q 118,308 130,250 Z"
              fill={T.lime} opacity="0.20"/>
          )}
          {lit.includes('gorge') && (
            <path d="M 80,460 Q 130,500 160,540 Q 200,600 250,640" fill="none"
              stroke={T.lime} strokeWidth="10" opacity="0.30" strokeLinecap="round"/>
          )}
          {lit.includes('field') && (
            <ellipse cx="262" cy="582" rx="42" ry="26" fill={T.lime} opacity="0.30"/>

          {/* POIs */}
          {pois.map(p => {
            const isLit = lit.includes(p.zone);
            const isActive = selected === p.id;
            const inProgress = state.mapTaskState[p.id] === 'inProgress';
            const labelY = p.y < 100 ? p.y + 28 : p.y - 18;
            return (

                onPointerUp={(e) => { e.stopPropagation(); onTap(p.id); }}

                <circle cx={p.x} cy={p.y} r="22" fill="rgba(0,0,0,0.001)"/>
                {(isActive || inProgress) && (
                  <circle cx={p.x} cy={p.y} r="22" fill="url(#poi-glow)" pointerEvents="none"/>
                )}
                <circle cx={p.x} cy={p.y} r={isActive ? 13 : 10}
                  fill={isLit ? T.lime : '#FFF'}

                {!isLit && <circle cx={p.x} cy={p.y} r="3" fill={T.coral} pointerEvents="none"/>}
                {/* POI name label */}
                <g pointerEvents="none">
                  <rect x={p.x - p.name.length*3.6 - 6} y={labelY - 9} width={p.name.length*7.2 + 12} height="16" rx="8"

                    stroke={isActive ? T.brownDeep : T.line} strokeWidth="0.8"/>
                  <text x={p.x} y={labelY + 2} textAnchor="middle"
                    style={{fontFamily:'"Inter"', fontSize: 9.5, fontWeight: 600,
                            fill: isActive ? T.lime : T.ink2, letterSpacing:'0.02em'}}>
                    {p.name}
                  </text>
                </g>
                {(isActive) && (
                  <circle cx={p.x} cy={p.y} r="14" fill="none" stroke={T.lime} strokeWidth="2" opacity="0.6" pointerEvents="none">
                    <animate attributeName="r" values="14;26" dur="1.4s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="0.7;0" dur="1.4s" repeatCount="indefinite"/>
                  </circle>
                )}
              </g>
            );
          })}

          {/* Compass */}
          <g transform="translate(348, 32)">
            <circle r="14" fill="#FFF" stroke={T.line}/>
            <path d="M 0,-8 L 3,0 L 0,8 L -3,0 Z" fill={T.coral}/>
            <text y="-18" textAnchor="middle" style={{fontFamily:'"JetBrains Mono"', fontSize: 9, fill: T.muted}}>N</text>
          </g>
        </svg>
      );
    }

    function ScreenMap({state, actions}) {
      const [selected, setSelected] = useState(null);
      const [filter, setFilter] = useState('all');
      const [viewBox, setViewBox] = useState({x: 0, y: 0, w: 390, h: 700});
      const [sheetMode, setSheetMode] = useState('peek'); // 'peek' | 'full'
      const dragRef = useRef(null);
      const mapBoxRef = useRef(null);

      const poi = MAP_POIS.find(p => p.id === selected);
      const taskState = poi ? state.mapTaskState[poi.id] : 'idle';

      const filtered = filter === 'all' ? MAP_POIS : MAP_POIS.filter(p => {
        if (filter === '探索') return p.type === '探索';
        if (filter === '训练') return p.type === '训练';
        if (filter === '恢复') return p.type === '恢复';
        if (filter === '组队') return p.type === '组队';
      });

      const zoomBy = (factor) => {
        setViewBox(vb => {
          const newW = Math.max(180, Math.min(560, vb.w * factor));
          const newH = newW * (700 / 390);
          const cx = vb.x + vb.w / 2, cy = vb.y + vb.h / 2;
          return {
            x: Math.max(-150, Math.min(540 - newW, cx - newW / 2)),
            y: Math.max(-150, Math.min(850 - newH, cy - newH / 2)),
            w: newW, h: newH,
          };
        });
      };

      const onPointerDown = (e) => {
        if (e.target.closest('[data-poi]') || e.target.closest('[data-control]')) return;
        const pt = e.touches ? e.touches[0] : e;
        if (e.cancelable) e.preventDefault();
        dragRef.current = { x: pt.clientX, y: pt.clientY, vbx: viewBox.x, vby: viewBox.y, moved: false };
      };
      const onPointerMove = (e) => {
        if (!dragRef.current) return;
        const pt = e.touches ? e.touches[0] : e;
        const rect = mapBoxRef.current?.getBoundingClientRect();
        if (!rect) return;
        const sx = viewBox.w / rect.width, sy = viewBox.h / rect.height;
        const dx = (dragRef.current.x - pt.clientX) * sx;
        const dy = (dragRef.current.y - pt.clientY) * sy;
        if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragRef.current.moved = true;
        setViewBox(vb => ({ ...vb,
          x: Math.max(-150, Math.min(540 - vb.w, dragRef.current.vbx + dx)),
          y: Math.max(-150, Math.min(850 - vb.h, dragRef.current.vby + dy)),
        }));
      };
      const onPointerUp = () => { dragRef.current = null; };
      const handlePoiTap = (id) => {
        if (dragRef.current && dragRef.current.moved) return;
        setSelected(id);
        setSheetMode('full');
      };

      return (
        <div className="cq-screen-enter" style={{
          flex: 1, position:'relative', display:'flex', flexDirection:'column',
          background: T.bg, overflow:'hidden',
        }}>
          {/* Top bar */}
          <div style={{
            position:'absolute', top: 8, left: 14, right: 14, zIndex: 8,
            display:'flex', flexDirection:'column', gap: 8,
          }}>
            <div style={{display:'flex', gap: 8, alignItems:'center'}}>
              <div style={{
                flex: 1, display:'flex', alignItems:'center', gap: 8,
                background: T.surface, borderRadius: 14,
                border: `1px solid ${T.line}`, padding: '10px 12px',
                boxShadow: '0 4px 12px rgba(20,18,12,0.08)',
              }}>
                <Ic.Search s={15} c={T.muted}/>
                <span style={{fontSize: 13, color: T.subtle, flex: 1}}>搜索校园点位 · 路线 · 任务</span>
                <Pill tone="ghost" size="xs">Preview</Pill>
              </div>
              <button style={{
                width: 40, height: 40, borderRadius: 14,
                background: T.surface, border: `1px solid ${T.line}`,
                display:'grid', placeItems:'center',
                boxShadow: '0 4px 12px rgba(20,18,12,0.08)',
              }} title="筛选">
                <Ic.Layers s={16} c={T.ink2}/>
              </button>
            </div>
            <div style={{
              display:'flex', gap: 6, overflowX:'auto', paddingBottom: 2,
            }} className="noscroll">
              {[
                {k:'all', label:'全部'},
                {k:'探索', label:'探索'},
                {k:'训练', label:'训练'},
                {k:'恢复', label:'恢复'},
                {k:'组队', label:'组队'},
              ].map(t => (
                <button key={t.k} onClick={() => setFilter(t.k)} style={{
                  padding: '5px 11px', borderRadius: 999,
                  background: filter === t.k ? T.brownDeep : T.surface,
                  color: filter === t.k ? '#FFF' : T.ink2,
                  border: `1px solid ${filter === t.k ? T.brownDeep : T.line}`,
                  fontSize: 12, fontWeight: 500,
                  whiteSpace:'nowrap', flex:'0 0 auto',
                }}>{t.label}</button>
              ))}
            </div>
          </div>

          {/* Map */}
          <div ref={mapBoxRef}
            onMouseDown={onPointerDown} onMouseMove={onPointerMove}
            onMouseUp={onPointerUp} onMouseLeave={onPointerUp}
            onTouchStart={onPointerDown} onTouchMove={onPointerMove} onTouchEnd={onPointerUp}
            style={{
              flex: 1, position:'relative',
              cursor: dragRef.current ? 'grabbing' : 'grab',
              touchAction:'none', userSelect:'none', WebkitUserSelect:'none',
            }}>
            <CampusMapSVG pois={filtered} state={state} onTap={handlePoiTap} selected={selected} viewBox={viewBox}/>

            {/* season badge corner */}
            <div data-control="1" style={{
              position:'absolute', top: 102, right: 14,
              background: T.brownDeep, color: '#FFF',
              borderRadius: 14, padding: '8px 10px',
              display:'flex', alignItems:'center', gap: 8,
              boxShadow: '0 6px 14px rgba(20,18,12,0.20)',
              zIndex: 5,
            }}>
              <div style={{
                width: 26, height: 26, borderRadius: 999, background: T.lime,
                display:'grid', placeItems:'center',
              }}>
                <Ic.Spark s={13} c={T.brownDeep}/>
              </div>
              <div>
                <div style={{fontSize: 9, color:'rgba(255,255,255,0.55)', letterSpacing:'0.10em'}} className="mono">SEASON LIT</div>
                <div className="mono" style={{fontSize: 14, fontWeight: 600}}>
                  <VitalityCounter value={state.seasonLit}/>/{state.seasonTotal}
                </div>
              </div>
            </div>

            {/* Zoom controls */}
            <div data-control="1" style={{
              position:'absolute', right: 14, top: 168,
              display:'flex', flexDirection:'column', gap: 2,
              background: T.surface, border: `1px solid ${T.line}`,
              borderRadius: 12, padding: 4, zIndex: 5,
              boxShadow: '0 4px 12px rgba(20,18,12,0.10)',
            }}>
              <button onClick={() => zoomBy(0.75)} title="放大" style={{
                width: 34, height: 34, borderRadius: 8, display:'grid', placeItems:'center',
                fontSize: 18, fontWeight: 600, color: T.ink,
              }}>+</button>
              <div style={{height: 1, background: T.lineSoft}}/>
              <button onClick={() => zoomBy(1.33)} title="缩小" style={{
                width: 34, height: 34, borderRadius: 8, display:'grid', placeItems:'center',
                fontSize: 18, fontWeight: 600, color: T.ink,
              }}>−</button>
              <div style={{height: 1, background: T.lineSoft}}/>
              <button onClick={() => setViewBox({x:0, y:0, w:390, h:700})} title="复位" style={{
                width: 34, height: 34, borderRadius: 8, display:'grid', placeItems:'center', color: T.muted,
              }}><Ic.Compass s={14} c={T.muted}/></button>
            </div>

            {/* legend */}
            <div data-control="1" style={{
              position:'absolute', bottom: poi && sheetMode === 'full' ? 250 : 70, left: 14,
              background: T.surface, border: `1px solid ${T.line}`,
              borderRadius: 12, padding: '8px 10px',
              fontSize: 11, color: T.ink2,
              display:'flex', gap: 10, alignItems:'center',
              boxShadow: '0 4px 12px rgba(20,18,12,0.08)',
              transition:'bottom 240ms ease', zIndex: 5,
            }}>
              <span style={{display:'flex', alignItems:'center', gap: 5}}>
                <span style={{width: 10, height: 10, borderRadius:99, background: T.lime, border:`1.5px solid ${T.brownDeep}`}}/>已点亮
              </span>
              <span style={{width: 1, height: 12, background: T.line}}/>
              <span style={{display:'flex', alignItems:'center', gap: 5}}>
                <span style={{width: 10, height: 10, borderRadius:99, background:'#FFF', border:`1.5px solid ${T.brownDeep}`}}/>待探索
              </span>
            </div>

            {/* Hint when no POI selected */}
            {!poi && (
              <div data-control="1" style={{
                position:'absolute', bottom: 16, left: 14, right: 14,
                background: T.brownDeep, color:'#FFF',
                borderRadius: 14, padding:'10px 14px',
                display:'flex', alignItems:'center', gap: 10,
                fontSize: 12, fontWeight: 500,
                boxShadow:'0 8px 20px rgba(20,18,12,0.18)', zIndex: 5,
              }}>
                <Ic.Pin s={14} c={T.lime}/>
                <span style={{flex: 1, color:'rgba(255,255,255,0.85)'}}>
                  点击任意点位查看任务详情 · 拖动地图 · 右上角缩放
                </span>
              </div>
            )}
          </div>

          {/* Task detail sheet - PEEK */}
          {poi && sheetMode === 'peek' && (
            <button onClick={() => setSheetMode('full')} style={{
              position:'absolute', left: 14, right: 14, bottom: 14,
              background: T.surface,
              borderRadius: 16,
              border:`1px solid ${T.line}`,
              padding: '10px 14px',
              boxShadow: '0 8px 22px rgba(20,18,12,0.14)',
              zIndex: 6, display:'flex', alignItems:'center', gap: 10,
              textAlign:'left',
            }} className="cq-fade-up" key={'peek-'+poi.id}>
              <div style={{
                width: 32, height: 32, borderRadius: 10,
                background: state.litAreas.includes(poi.zone) ? T.lime : T.cardAlt,
                display:'grid', placeItems:'center', flex:'0 0 auto',
              }}>
                <Ic.Pin s={15} c={state.litAreas.includes(poi.zone) ? T.brownDeep : T.coral}/>
              </div>
              <div style={{flex: 1, minWidth: 0}}>
                <div style={{fontSize: 11, color: T.muted, letterSpacing:'0.04em'}}>{poi.type} · {poi.duration}</div>
                <div className="display" style={{fontSize: 14, fontWeight: 600, color: T.ink, lineHeight: 1.2, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
                  {poi.name}
                </div>
              </div>
              <span className="mono" style={{
                background: T.cardAlt, color: T.ink,
                padding:'5px 8px', borderRadius: 8,
                fontSize: 11, fontWeight: 600,
                display:'flex', alignItems:'center', gap: 3, flex:'0 0 auto',
              }}><Ic.Lightning s={10} c={T.limeDeep}/>+{poi.reward}</span>
              <span style={{fontSize: 12, color: T.muted, fontWeight: 500}}>展开 ↑</span>
            </button>
          )}

          {/* Task detail sheet - FULL */}
          {poi && sheetMode === 'full' && (
            <div style={{
              position:'absolute', left: 0, right: 0, bottom: 0,
              background: T.surface,
              borderRadius: '24px 24px 0 0',
              borderTop: `1px solid ${T.line}`,
              padding: '8px 18px 16px',
              boxShadow: '0 -10px 28px rgba(20,18,12,0.08)',
              zIndex: 6,
            }} className="cq-fade-up" key={'full-'+poi.id}>
              {/* drag handle / collapse */}
              <button onClick={() => setSheetMode('peek')} style={{
                width: '100%', display:'flex', justifyContent:'center', padding: '4px 0 8px',
              }} title="收起">
                <span style={{width: 42, height: 4, borderRadius: 99, background: T.line, display:'block'}}/>
              </button>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap: 10}}>
                <div style={{minWidth: 0, flex: 1}}>
                  <div style={{display:'flex', alignItems:'center', gap: 6, marginBottom: 3, flexWrap:'wrap'}}>
                    <Pill tone={
                      poi.type === '探索' ? 'blue' :
                      poi.type === '训练' ? 'coral' :
                      poi.type === '恢复' ? 'green' : 'amber'
                    } size="xs">{poi.type}</Pill>
                    <Pill tone="ghost" size="xs" icon={<Ic.Pin s={9} c={T.muted}/>}>{poi.en}</Pill>
                    {state.litAreas.includes(poi.zone) && (
                      <Pill tone="lime" size="xs" icon={<Ic.Check s={9}/>}>已点亮</Pill>
                    )}
                  </div>
                  <div className="display" style={{fontSize: 19, fontWeight: 600, color: T.ink, lineHeight: 1.15}}>
                    {poi.name}
                  </div>
                  <div style={{fontSize: 12.5, color: T.muted, marginTop: 4, lineHeight: 1.4}}>
                    {poi.desc}
                  </div>
                </div>
                <div className="mono" style={{
                  background: T.cardAlt, padding: '6px 10px', borderRadius: 12,
                  fontSize: 11, color: T.ink, textAlign:'center', flex:'0 0 auto',
                }}>
                  <div style={{fontSize: 10, color: T.muted, fontWeight: 500}}>奖励</div>
                  <div style={{display:'flex', alignItems:'center', gap: 3, marginTop: 2}}>
                    <Ic.Lightning s={11} c={T.limeDeep}/>
                    +{poi.reward}
                  </div>
                </div>
              </div>

              <div style={{
                display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap: 8, marginTop: 12,
              }}>
                <div style={{background: T.cardAlt, borderRadius: 10, padding: '7px 10px'}}>
                  <div style={{fontSize: 10, color: T.muted}}>方式</div>
                  <div style={{fontSize: 11.5, color: T.ink, fontWeight: 600, marginTop: 2}}>{poi.method}</div>
                </div>
                <div style={{background: T.cardAlt, borderRadius: 10, padding: '7px 10px'}}>
                  <div style={{fontSize: 10, color: T.muted}}>耗时</div>
                  <div className="mono" style={{fontSize: 11.5, color: T.ink, fontWeight: 600, marginTop: 2}}>{poi.duration}</div>
                </div>
                <div style={{background: T.cardAlt, borderRadius: 10, padding: '7px 10px'}}>
                  <div style={{fontSize: 10, color: T.muted}}>距离</div>
                  <div className="mono" style={{fontSize: 11.5, color: T.ink, fontWeight: 600, marginTop: 2}}>{poi.distance}</div>
                </div>
              </div>

              <div style={{
                marginTop: 10, padding: '8px 11px',
                background: 'rgba(201,242,62,0.16)', borderRadius: 10,
                fontSize: 11.5, color: T.ink2, lineHeight: 1.4,
                display:'flex', alignItems:'center', gap: 6,
              }}>
                <Ic.Spark s={11} c={T.limeDeep}/>
                <span>完成可点亮「{ZONE_BY_ID[poi.zone]}」区域 · 推进徽章进度</span>
              </div>

              <div style={{marginTop: 12, display:'flex', gap: 8}}>
                {taskState === 'idle' && !state.litAreas.includes(poi.zone) && (
                  <button onClick={() => actions.startMapTask(poi)} style={{

            </div>
            <div style={{display:'flex', gap: 3, alignItems:'flex-end', height: 50}}>
              {[6,8,12,16,14,10,18,28,38,42,32,20,12,8].map((v, i) => (
                <div key={i} style={{
                  flex: 1, height: (v/42)*100 + '%',
                  background: v > 30 ? T.coral : v > 16 ? T.amber : T.lime,
                  borderRadius: 2, opacity: 0.85,
                }}/>
              ))}
            </div>
            <div style={{display:'flex', justifyContent:'space-between', fontSize: 9.5, color: T.subtle, marginTop: 6}} className="mono">
              <span>06</span><span>12</span><span>18</span><span>23</span>
            </div>
          </div>
        </div>
      );
    }

    function ScreenBadges({state, actions}) {
      const [filter, setFilter] = useState('all');
      const [tab, setTab] = useState('badges');
      const filtered = filter === 'all' ? ALL_BADGES :
                       filter === 'season' ? ALL_BADGES.filter(b => b.cat === 'season' || b.cat === 'limited') :
                       filter === 'limited' ? ALL_BADGES.filter(b => b.cat === 'limited') :
                       filter === 'place' ? ALL_BADGES.filter(b => b.cat === 'place') :
                       filter === 'event' ? ALL_BADGES.filter(b => b.cat === 'event') : ALL_BADGES;
      const earned = ALL_BADGES.filter(b => (state.badges[b.id] ?? BADGE_STATIC[b.id].baseProgress) >= 100).length;
      const total = ALL_BADGES.length;
      const score = state.vitality + state.seasonLit * 30 + earned * 50;

      return (
        <div className="cq-screen-enter" style={{
          flex: 1, overflowY:'auto', overflowX:'hidden',
          padding: '8px 18px 24px', display:'flex', flexDirection:'column', gap: 14,
        }} className="noscroll cq-screen-enter">
          {/* tier card */}
          <div style={{
            background: `linear-gradient(135deg, #FAF5E6 0%, #F1E7C9 100%)`,
            borderRadius: 22, padding: 16,
            border: `1px solid ${T.line}`,
            position:'relative', overflow:'hidden',
          }}>
            <div style={{
              position:'absolute', right: -20, top: -20,
              width: 140, height: 140, borderRadius: 999,
              background: 'radial-gradient(circle, rgba(255,181,71,0.30) 0%, transparent 65%)',
            }}/>
            <div style={{display:'flex', alignItems:'center', gap: 12, position:'relative'}}>
              <div style={{
                width: 56, height: 56, borderRadius: 16,
                background: T.brownDeep, color: T.lime,
                display:'grid', placeItems:'center', flex:'0 0 auto',
                boxShadow: '0 8px 16px rgba(20,18,12,0.20)',
              }}>
                <Ic.Trophy s={26} c={T.lime}/>
              </div>
              <div style={{flex: 1, minWidth: 0}}>
                <div style={{display:'flex', alignItems:'center', gap: 6}}>
                  <Pill tone="ink" size="xs">称号 · TIER 3</Pill>
                  <span className="mono" style={{fontSize: 10, color: T.muted}}>S04</span>
                </div>
                <div className="display" style={{fontSize: 22, fontWeight: 600, color: T.ink, marginTop: 4, letterSpacing:'-0.01em'}}>
                  湖畔学徒
                </div>
                <div style={{fontSize: 11.5, color: T.muted, marginTop: 1}}>
                  距下个称号「湖畔守望者」还差 <span style={{color: T.coral, fontWeight: 600}} className="mono">320 分</span>
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize: 10, color: T.muted, letterSpacing:'0.06em'}} className="mono">SCORE</div>
                <div className="mono display" style={{fontSize: 24, fontWeight: 700, color: T.ink, letterSpacing:'-0.02em'}}>
                  <VitalityCounter value={score}/>
                </div>
              </div>
            </div>
            <div style={{
              marginTop: 12, fontSize: 11.5, color: T.ink2, lineHeight: 1.5,
              padding: '8px 11px', background: 'rgba(20,18,12,0.04)', borderRadius: 10,
            }}>
              <span style={{color: T.brownDeep, fontWeight: 600}}>你在校园里的每次行动</span>，都会沉淀成赛季称号、徽章与档案
            </div>
          </div>

          {/* sub tabs */}
          <div style={{
            display:'flex', gap: 4, padding: 3,
            background: T.surface, borderRadius: 12,
            border: `1px solid ${T.line}`,
          }}>
            {[
              {k:'badges', label:`徽章 · ${earned}/${total}`},
              {k:'archive', label:'赛季档案'},
            ].map(t => (
              <button key={t.k} onClick={() => setTab(t.k)} style={{
                flex: 1, padding: '8px 10px', borderRadius: 9,
                background: tab === t.k ? T.brownDeep : 'transparent',
                color: tab === t.k ? '#FFF' : T.muted,
                fontSize: 12.5, fontWeight: 600,
                transition:'all 200ms',
              }}>{t.label}</button>
            ))}
          </div>

          {tab === 'badges' && (
            <Fragment>
              {/* category tabs */}
              <div style={{display:'flex', gap: 6, overflowX:'auto', paddingBottom: 2}} className="noscroll">
                {[
                  {k:'all', label:'全部'},
                  {k:'season', label:'本赛季'},
                  {k:'limited', label:'限定'},
                  {k:'place', label:'地点', preview: false},
                  {k:'event', label:'事件', preview: false},
                ].map(t => (
                  <button key={t.k} onClick={() => setFilter(t.k)} style={{
                    padding: '5px 11px', borderRadius: 999,
                    background: filter === t.k ? T.brownDeep : T.surface,
                    color: filter === t.k ? '#FFF' : T.ink2,
                    border: `1px solid ${filter === t.k ? T.brownDeep : T.line}`,
                    fontSize: 12, fontWeight: 500,
                    whiteSpace:'nowrap', flex:'0 0 auto',
                    display:'flex', alignItems:'center', gap: 5,
                  }}>{t.label}{t.preview && <Pill tone="ghost" size="xs">·</Pill>}</button>
                ))}
              </div>

              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap: 10}}>
                {filtered.map(b => {
                  const progress = state.badges[b.id] ?? BADGE_STATIC[b.id].baseProgress;
                  const recent = state.recentBadges?.includes(b.id);
                  return (
                    <BadgeTile key={b.id} b={b} progress={progress} recent={recent}/>
                  );
                })}
              </div>

              <div style={{
                marginTop: 6,
                background: T.surface, borderRadius: 14,
                border: `1px solid ${T.line}`, padding: '11px 14px',
                fontSize: 11.5, color: T.muted, lineHeight: 1.5,
                display:'flex', gap: 10, alignItems:'flex-start',
              }}>
                <Ic.Spark s={14} c={T.limeDeep}/>
                <span>完成<b style={{color: T.ink}}>探索 · 恢复 · 组队</b>等校园任务，徽章与称号会在这里持续累积。本赛季限定徽章在 06.20 收摊</span>
              </div>
            </Fragment>
          )}

          {tab === 'archive' && (
            <ArchivePane state={state} totalEarned={earned}/>
          )}

          <div style={{height: 8}}/>
        </div>
      );
    }

    /* ================================================================
       APP
    ================================================================ */
    function App() {
      const [screen, setScreen] = useState('home');
      const [toasts, setToasts] = useState([]);
      const [state, setState] = useState({
        vitality: 280,
        seasonLit: 14,
        seasonTotal: 22,
        litAreas: ['arts'],
        onboardDismissed: false,
        taskState: { t1:'idle', t2:'idle', t3:'idle' },
        mapTaskState: { m1:'idle', m2:'idle', m3:'idle', m4:'idle', m5:'idle' },
        playState: { p1:'idle', p2:'idle', p3:'idle', p4:'idle' },
        badges: Object.fromEntries(Object.entries(BADGE_STATIC).map(([k, v]) => [k, v.baseProgress])),
        recentBadges: [],
      });

      const pushToast = useCallback((toast) => {
        const id = Math.random().toString(36).slice(2);
        setToasts(t => [...t, {id, ...toast}]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2800);
      }, []);

      const bumpBadge = useCallback((badgeId, points) => {
        if (!badgeId) return;
        setState(s => ({
          ...s,
          badges: { ...s.badges, [badgeId]: Math.min(100, (s.badges[badgeId] ?? 0) + points) },
          recentBadges: [...new Set([...(s.recentBadges || []), badgeId])],
        }));
      }, []);

      const lightArea = useCallback((zone) => {
        if (!zone) return;
        setState(s => s.litAreas.includes(zone) ? s : ({
          ...s,
          litAreas: [...s.litAreas, zone],
          seasonLit: Math.min(s.seasonTotal, s.seasonLit + 1),
        }));
      }, []);

      const actions = useMemo(() => ({
        toast: pushToast,
        dismissOnboard: () => setState(s => ({ ...s, onboardDismissed: true })),
        completeTask: (task) => {
          setState(s => {
            if (s.taskState[task.id] === 'completed') return s;
            return {
              ...s,
              taskState: { ...s.taskState, [task.id]: 'completed' },
              vitality: s.vitality + task.reward,
            };
          });
          if (task.affectsBadge) bumpBadge(task.affectsBadge, task.badgePoints);
          if (task.litArea) lightArea(task.litArea);
          pushToast({
            title: `任务完成 · +${task.reward} 活力`,
            detail: task.litArea ? `点亮「${ZONE_BY_ID[task.litArea] || task.litArea}」 · 徽章已推进` : '徽章进度已推进',
            tone:'dark', icon:'check',
          });
        },
        startMapTask: (poi) => {
          setState(s => ({
            ...s,
            mapTaskState: { ...s.mapTaskState, [poi.id]: 'inProgress' },
          }));
          pushToast({
            title: `已开始 · ${poi.name}`,
            detail: `${poi.method} · 预计 ${poi.duration}`,
            tone:'dark', icon:'pin',
          });
        },
        completeMapTask: (poi) => {
          setState(s => ({
            ...s,
            mapTaskState: { ...s.mapTaskState, [poi.id]: 'completed' },
            vitality: s.vitality + poi.reward,
          }));
          if (poi.affectsBadge) bumpBadge(poi.affectsBadge, poi.badgePoints);
          if (poi.zone) lightArea(poi.zone);
          pushToast({
            title: `任务完成 · +${poi.reward} 活力`,
            detail: `点亮「${ZONE_BY_ID[poi.zone] || poi.zone}」区域`,
            tone:'dark', icon:'check',
          });
        },
        joinPlay: (item) => {
          setState(s => {
            if (s.playState[item.id] === 'joined') return s;
            return {
              ...s,
              playState: { ...s.playState, [item.id]: 'joined' },
            };
          });
          if (item.affectsBadge) bumpBadge(item.affectsBadge, item.badgePoints);
          pushToast({
            title: `已加入 · ${item.title}`,
            detail: `推进「春日共玩」徽章 · 等待开始`,
            tone:'dark', icon:'group',
          });
        },
      }), [pushToast, bumpBadge, lightArea]);

      // clear "recent" highlight after a while
      useEffect(() => {
        if (!state.recentBadges?.length) return;
        const t = setTimeout(() => setState(s => ({ ...s, recentBadges: [] })), 5500);
        return () => clearTimeout(t);
      }, [state.recentBadges]);

      const Screen =
        screen === 'home' ? <ScreenHome state={state} actions={actions} onJump={setScreen}/> :
        screen === 'map'  ? <ScreenMap state={state} actions={actions}/> :
        screen === 'play' ? <ScreenPlay state={state} actions={actions} onJump={setScreen}/> :
                            <ScreenBadges state={state} actions={actions}/>;

      return (
        <div style={{
          width:'100%', height:'100%',
          display:'flex', flexDirection:'column',
          background: T.bg, position:'relative',
        }}>
          <StatusBar tone="light"/>
          <ToastHost toasts={toasts}/>
          {Screen}
          <TabBar active={screen} setActive={setScreen}/>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
