<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Campus Quest · 校园里的赛季运动游戏</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Inter", "Noto Sans SC", system-ui, -apple-system, sans-serif;
      background: #F1ECDF;
      color: #15140F;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .display { font-family: "Space Grotesk", "Noto Sans SC", sans-serif; letter-spacing: -0.02em; }
    .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-feature-settings: "tnum"; }
    button { font-family: inherit; cursor: pointer; border: 0; background: transparent; padding: 0; color: inherit; }
    a { color: inherit; text-decoration: none; }

    @keyframes cq-fade-up { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes cq-pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes cq-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes cq-shimmer { 0% { background-position: -120% 0; } 100% { background-position: 220% 0; } }
    @keyframes cq-spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

    .cq-fade-up { animation: cq-fade-up 600ms ease-out both; }
    .cq-fade-1 { animation-delay: 80ms; }
    .cq-fade-2 { animation-delay: 160ms; }
    .cq-fade-3 { animation-delay: 240ms; }
    .cq-fade-4 { animation-delay: 320ms; }
    .cq-fade-5 { animation-delay: 400ms; }
    .cq-fade-6 { animation-delay: 480ms; }

    .cq-card { transition: transform 200ms ease, box-shadow 200ms ease, border-color 200ms ease; }
    .cq-card:hover { transform: translateY(-4px); box-shadow: 0 16px 36px rgba(20,18,12,0.10); }

    .cta-pri { transition: transform 180ms, box-shadow 180ms, background 180ms; }
    .cta-pri:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(20,18,12,0.30); }
    .cta-pri:active { transform: translateY(0); }
    .cta-sec { transition: background 180ms, border-color 180ms; }
    .cta-sec:hover { background: #EBE3CB; border-color: #15140F !important; }

    .softscroll::-webkit-scrollbar { width: 10px; height: 10px; }
    .softscroll::-webkit-scrollbar-track { background: transparent; }
    .softscroll::-webkit-scrollbar-thumb { background: rgba(20,18,12,0.10); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
    .softscroll::-webkit-scrollbar-thumb:hover { background: rgba(20,18,12,0.20); }

    .grid-bg::before {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(rgba(20,18,12,0.05) 1px, transparent 1px);
      background-size: 24px 24px; pointer-events: none;
    }

    .frame-mobile { display: none; width: 100%; height: 100vh; }
    .frame-web { display: none; width: 100%; height: 100vh; }
    .show { display: block !important; }

    /* Stage for the embedded mobile preview */
    .demo-stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(80% 60% at 50% 20%, #1d1c16 0%, #0F0E0A 60%);
      z-index: 0;
    }
    .demo-stage::before {
      content: ""; position: absolute; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 24px 24px; pointer-events: none;
    }

    .iframe-shell {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #F1ECDF;
      z-index: 0;
    }
    .iframe-shell iframe {
      border: 0; width: 100%; height: 100%;
      background: #F1ECDF;
    }

    .topnav {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 12px 20px;
      background: rgba(241,236,223,0.92);
      backdrop-filter: saturate(140%) blur(12px);
      border-bottom: 1px solid #DCD3B8;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 100;
    }
    .topnav-app {
      background: rgba(15,14,10,0.78);
      border-bottom-color: rgba(255,255,255,0.10);
      color: #FFF;
    }

    @media (max-width: 740px) {
      .hero-grid { grid-template-columns: 1fr !important; }
      .features-grid { grid-template-columns: 1fr !important; }
      .modules-grid { grid-template-columns: 1fr !important; }
      .h-display { font-size: 38px !important; }
      .cta-row { flex-direction: column; }
      .cta-row > * { width: 100%; }
    }
  </style>
</head>

    function LoginModal({open, onClose, onSubmit, demoUser, sessionUser, profile, progress, onLogout}) {
      const [name, setName] = useState(demoUser?.name || profile?.name || '毛柯兰');
      const [email, setEmail] = useState(demoUser?.email || sessionUser?.email || profile?.email || 'kelan@cornell.edu');
      const [status, setStatus] = useState('idle');
      const [message, setMessage] = useState('');
      const isLoggedIn = !!sessionUser;

      useEffect(() => {
        if (!open) return;
        setStatus('idle');
        setMessage('');
        setName(demoUser?.name || profile?.name || sessionUser?.user_metadata?.name || '毛柯兰');
        setEmail(demoUser?.email || sessionUser?.email || profile?.email || 'kelan@cornell.edu');
      }, [open, demoUser, sessionUser, profile]);

      if (!open) return null;

      async function handlePrimaryAction() {
        if (!HAS_REAL_AUTH) {
          onSubmit({ name: name.trim() || '毛柯兰', email: email.trim() || 'kelan@cornell.edu' });
          return;
        }

        setStatus('submitting');
        setMessage('');
        const redirectTo = `${window.location.origin}${window.location.pathname}`;
        const { error } = await sb.auth.signInWithOtp({
          email: email.trim(),
          options: {
            emailRedirectTo: redirectTo,
            data: { name: name.trim() || '毛柯兰' },
          },
        });

        if (error) {
          setStatus('error');
          setMessage(error.message || 'Magic Link 发送失败，请稍后重试。');
          return;
        }

        setStatus('success');
        setMessage('Magic Link 已发送，请前往邮箱完成登录。');
      }

      async function handleLogout() {
        if (HAS_REAL_AUTH && sb) await sb.auth.signOut();
        onLogout?.();
        setStatus('idle');
        setMessage('');
        onClose();
      }

              marginTop: 18, padding:'12px 14px',
              borderRadius: 14, background:T.cardAlt,
              fontSize: 12.5, color: T.ink2, lineHeight: 1.55,
            }}>
              {HAS_REAL_AUTH
                ? '当前页面已接入 Supabase Auth。在线上链接或本地 http 预览下，这里会发送真实 Magic Link，并读取用户档案与进度。'
                : '当前是 file:// 本地预览模式。为了不破坏这份展示页，file 打开时保留本地 demo 登录；放到线上或本地 http 地址后会自动切到真实登录。'}
            </div>

            {isLoggedIn && profile ? (
              <div style={{
                marginTop: 12, padding:'12px 14px',
                borderRadius: 14, border:`1px solid ${T.line}`,
                background:'#FFF',
                fontSize: 12.5, color: T.ink2, lineHeight: 1.65,
              }}>
                <div style={{fontWeight: 700, color: T.ink, marginBottom: 4}}>{profile.name} · 已登录</div>
                <div>{profile.email}</div>
                {progress ? <div>活力值 {progress.vitality} · 点亮区域 {progress.season_lit} · 连续活跃 {progress.streak_days} 天</div> : null}
              </div>
            ) : null}

            {message ? (
              <div style={{
                marginTop: 12, padding:'12px 14px',
                borderRadius: 14,
                background: status === 'error' ? 'rgba(255,106,61,0.12)' : 'rgba(201,242,62,0.18)',
                fontSize: 12.5, color: T.ink2, lineHeight: 1.55,
              }}>
                {message}
              </div>
            ) : null}

            <div style={{display:'flex', gap: 10, justifyContent:'flex-end', marginTop: 20}}>
              {isLoggedIn ? (
                <button onClick={handleLogout} className="cta-sec" style={{
                  background:T.bg, border:`1px solid ${T.line}`,
                  padding:'12px 16px', borderRadius: 12,
                  fontSize: 14, fontWeight: 600, color:T.ink,
                }}>退出登录</button>
              ) : null}
              <button onClick={onClose} className="cta-sec" style={{
                background:T.bg, border:`1px solid ${T.line}`,
                padding:'12px 16px', borderRadius: 12,
                fontSize: 14, fontWeight: 600, color:T.ink,
              }}>先不登录</button>
              <button onClick={handlePrimaryAction} className="cta-pri" style={{
                background:T.brownDeep, color:'#FFF',
                padding:'12px 18px', borderRadius: 12,
                fontSize: 14, fontWeight: 600,
              }}>{HAS_REAL_AUTH ? (status === 'submitting' ? '发送中...' : '发送 Magic Link') : '进入 Demo'}</button>
            </div>
          </div>
        </div>
      );
    }

    /* DEMO HOST — wraps iframe with top nav */
    function DemoHost({src, mode, onBack, onOpenLogin, demoUser}) {
      const isApp = mode === 'app';
      return (
        <Fragment>
          <header className={'topnav ' + (isApp ? 'topnav-app' : '')}>
            <button onClick={onBack} style={{
              display:'flex', alignItems:'center', gap: 6,
              padding:'7px 12px', borderRadius: 10,
              background: isApp ? 'rgba(255,255,255,0.10)' : T.surface,
              color: isApp ? '#FFF' : T.ink,
              border: `1px solid ${isApp ? 'rgba(255,255,255,0.14)' : T.line}`,
              fontSize: 13, fontWeight: 500,
            }}>
              <Ic.ArrowL s={14} c={isApp ? '#FFF' : T.ink}/> 返回首页
            </button>
            <div style={{display:'flex', alignItems:'center', gap: 8}}>
              <div style={{
                width: 28, height: 28, borderRadius: 8,
                background: isApp ? T.lime : T.brownDeep,
                color: isApp ? T.brownDeep : T.lime,
                display:'grid', placeItems:'center',
                fontFamily:'"Space Grotesk"', fontWeight: 700, fontSize: 12, letterSpacing:'-0.04em',
              }}>CQ</div>
              <span className="display" style={{fontSize: 14, fontWeight: 600, color: isApp ? '#FFF' : T.ink}}>
                Campus Quest · {isApp ? 'App 端' : '网页端'}
              </span>
              <span className="mono" style={{
                fontSize: 10, color: isApp ? 'rgba(255,255,255,0.45)' : T.muted,
                letterSpacing:'0.10em', marginLeft: 4,
              }}>S04 · LAKESIDE SPRING</span>
            </div>
          </header>
          <div style={{
            position: 'fixed', inset: 0, paddingTop: 60,
            zIndex: 1, overflow: 'hidden',
          }}>
            <iframe src={src} title={isApp ? 'App Demo' : 'Web Demo'}
              style={{
                width:'100%', height:'100%', border: 0,
                background: isApp ? '#0F0E0A' : T.bg,
                display:'block',
              }}/>
          </div>
        </Fragment>
      );
    }

    const Fragment = React.Fragment;

    /* ROOT */
    function App() {
      // mode: 'home' | 'app' | 'web'
      const [mode, setMode] = useState(() => {
        const h = window.location.hash.replace('#','');
        if (h === 'app' || h === 'web') return h;
        return 'home';
      });
      const [loginOpen, setLoginOpen] = useState(false);
      const [demoUser, setDemoUser] = useState(() => {
        try {
          const raw = window.localStorage.getItem('cq-demo-user');
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      });
      const [sessionUser, setSessionUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [progress, setProgress] = useState(null);

      async function loadUserState(user) {
        if (!HAS_REAL_AUTH || !sb || !user) {
          setProfile(null);
          setProgress(null);
          return;
        }

        const [{ data: profileRow }, { data: progressRow }] = await Promise.all([
          sb.from('profiles').select('*').eq('id', user.id).maybeSingle(),
          sb.from('user_progress').select('*').eq('user_id', user.id).maybeSingle(),
        ]);

        setProfile(profileRow || null);
        setProgress(progressRow || null);
      }

      useEffect(() => {
        if (mode === 'home') window.location.hash = '';
        else window.location.hash = '#' + mode;
        window.scrollTo(0, 0);
      }, [mode]);

      useEffect(() => {
        const onHash = () => {
          const h = window.location.hash.replace('#','');
          setMode((h === 'app' || h === 'web') ? h : 'home');
        };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      useEffect(() => {
        try {
          if (demoUser) window.localStorage.setItem('cq-demo-user', JSON.stringify(demoUser));
          else window.localStorage.removeItem('cq-demo-user');
        } catch {}
      }, [demoUser]);

      useEffect(() => {
        if (!HAS_REAL_AUTH || !sb) return undefined;

        sb.auth.getUser().then(async ({ data }) => {
          const user = data?.user || null;
          setSessionUser(user);
          if (user) await loadUserState(user);
        });

        const { data } = sb.auth.onAuthStateChange(async (_event, session) => {
          const user = session?.user || null;
          setSessionUser(user);
          if (user) {
            await loadUserState(user);
          } else {
            setProfile(null);
            setProgress(null);
          }
        });

        return () => data.subscription.unsubscribe();
      }, []);

      function handleDemoSubmit(user) {
        setDemoUser(user);
        setLoginOpen(false);
      }

      function handleLogout() {
        setDemoUser(null);
        setSessionUser(null);
        setProfile(null);
        setProgress(null);
      }

      const viewer = profile
        ? { name: profile.name, email: profile.email }
        : sessionUser
          ? { name: sessionUser.user_metadata?.name || sessionUser.email, email: sessionUser.email }
          : demoUser;

      if (mode === 'app') {
        const appDemoSrc = "Campus%20Quest.html";
        return (
          <Fragment>
            <DemoHost
              src={appDemoSrc}
              mode="app"
              demoUser={viewer}
              onOpenLogin={() => setLoginOpen(true)}
              onBack={() => setMode('home')}
            />
            <LoginModal
              open={loginOpen}
              demoUser={demoUser}
              sessionUser={sessionUser}
              profile={profile}
              progress={progress}
              onClose={() => setLoginOpen(false)}
              onSubmit={handleDemoSubmit}
              onLogout={handleLogout}
            />
          </Fragment>
        );
      }
      if (mode === 'web') {
        return (
          <Fragment>
            <DemoHost
              src="Campus%20Quest%20Web.html"
              mode="web"
              demoUser={viewer}
              onOpenLogin={() => setLoginOpen(true)}
              onBack={() => setMode('home')}
            />
            <LoginModal
              open={loginOpen}
              demoUser={demoUser}
              sessionUser={sessionUser}
              profile={profile}
              progress={progress}
              onClose={() => setLoginOpen(false)}
              onSubmit={handleDemoSubmit}
              onLogout={handleLogout}
            />
          </Fragment>
        );
      }
      return (
        <Fragment>
          <Landing
            demoUser={viewer}
            onOpenLogin={() => setLoginOpen(true)}
            onPickApp={() => setMode('app')}
            onPickWeb={() => setMode('web')}
          />
          <LoginModal
            open={loginOpen}
            demoUser={demoUser}
            sessionUser={sessionUser}
            profile={profile}
            progress={progress}
            onClose={() => setLoginOpen(false)}
            onSubmit={handleDemoSubmit}
            onLogout={handleLogout}
          />
        </Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(<App />);
  </script>
</body>
</html>
